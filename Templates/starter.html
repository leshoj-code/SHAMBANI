<!DOCTYPE html>
<html>
<head>
    <title>ShambaShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">ShambaShare</a>
        </div>
    </nav>

    <style>
    body {
        /* Replace with your image path or a high-res Unsplash URL */
        background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), 
                          url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
    }

    .card {
        backdrop-filter: blur(5px);
        background-color: rgba(255, 255, 255, 0.9) !important;
         }
    </style>
    <div class="container mt-4">

      <div class="toast-container position-fixed bottom-0 end-0 p-3">
        {% if messages %}
        {% for message in messages %}
        <div id="liveToast" class="toast show align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    ✅ {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        {% if messages %}
        {% for message in messages %}
        <div class="toast show align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">✅ {{ message }}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        {% endfor %}
        {% endif %}
    </div>
    
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
