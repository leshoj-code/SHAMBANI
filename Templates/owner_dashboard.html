{% extends 'starter.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold">My Equipment</h4>
    <span class="badge bg-success" id="ws-status">🟢 Live</span>
</div>

<!-- Equipment list — each item has a status badge keyed by equipment ID -->
{% for equipment in equipment_list %}
<div class="card mb-3 shadow-sm border-0 rounded-4">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h6 class="fw-bold mb-0">{{ equipment.name }}</h6>
            <small class="text-muted">{{ equipment.equipment_type }}</small>
        </div>
        <!-- Use equipment.id (not name) as the key — names can have spaces/collisions -->
        <span id="status-{{ equipment.id }}" 
              class="badge rounded-pill px-3 {% if equipment.status == 'Active' %}bg-success{% else %}bg-secondary{% endif %}">
            {{ equipment.status }}
        </span>
    </div>
</div>
{% endfor %}
{% endblock %}

{% block extra_js %}
<script>
    const orderModalElement = document.getElementById('orderRequestModal');
    const orderModal        = new bootstrap.Modal(orderModalElement);

    // Stored so acceptOrder() can send the right order ID back
    let currentOrderId = null;

    const socket = new WebSocket(
        (window.location.protocol === 'https:' ? 'wss://' : 'ws://') +
        window.location.host + '/ws/notifications/'
    );

    socket.onopen = function() {
        document.getElementById('ws-status').textContent = '🟢 Live';
    };

    socket.onclose = function() {
        document.getElementById('ws-status').textContent = '🔴 Offline';
        console.error('WebSocket closed — real-time updates paused.');
    };

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        if (data.type === 'order_request') {
            // Populate modal and store the order ID for acceptOrder()
            document.getElementById('renterName').innerText = data.renter_name;
            document.getElementById('machineName').innerText = data.machine_name;
            currentOrderId = data.order_id;   // ← server must send this
            orderModal.show();                 // ← this was missing before
        }

        else if (data.type === 'status_update') {
            // Update the badge by equipment ID
            const badge = document.getElementById(`status-${data.equipment_id}`);
            if (badge) {
                badge.innerText    = data.new_status;
                badge.className    = 'badge rounded-pill px-3 ' +
                                     (data.new_status === 'Active' ? 'bg-success' : 'bg-secondary');
            }
        }

        else if (data.type === 'notification_alert') {
            // Renter-side message — shouldn't arrive here, but safe to log
            console.log('Alert:', data.message);
        }
    };

    async function acceptOrder() {
        if (!currentOrderId) {
            console.error('No order ID stored — cannot accept.');
            return;
        }

        const response = await fetch('/accept-order/', {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ order_id: currentOrderId })  // send ID, not name
        });

        if (response.ok) {
            orderModal.hide();
            currentOrderId = null;
        } else {
            alert('Something went wrong accepting the order.');
        }
    }
</script>
{% endblock %}
