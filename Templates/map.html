{% extends 'starter.html' %}

{% block content %}
<div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-3">
        <div class="row g-2 align-items-center">
            <div class="col-md-5">
                <input type="text" id="nameSearch" class="form-control rounded-pill" placeholder="Search equipment name (e.g. Massey)...">
            </div>
            <div class="col-md-4">
                <select id="typeFilter" class="form-select rounded-pill">
                    <option value="">All Equipment Types</option>
                    <option value="Tractor">Tractors</option>
                    <option value="Water Pump">Water Pumps</option>
                    <option value="Harvester">Harvesters</option>
                </select>
            </div>
            <div class="col-md-3">
                <button onclick="filterMap()" class="btn btn-success w-100 rounded-pill shadow-sm">🔍 Filter Map</button>
            </div>
        </div>
    </div>
</div>

<button onclick="locateUser()" class="btn btn-primary rounded-pill mb-3 shadow-sm">
    📍 Find My Current Location
</button>
<div id="map" style="height: 600px; min-height: 600px; width: 100%; border-radius: 20px; z-index: 1;" class="shadow-lg"></div>

<script>
    var map;

    document.addEventListener("DOMContentLoaded", function() {
        if (typeof L !== 'undefined') {
            map = L.map('map').setView([-1.286389, 36.817223], 12);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            var allItems = {{ equipment_json|safe }};
            var markerLayer = L.layerGroup().addTo(map);

            function displayMarkers(data) {
                markerLayer.clearLayers();
                data.forEach(function(item) {
                    var marker = L.marker([item.lat, item.lng]);
                    marker.bindPopup(`
                        <div style="text-align: center;">
                            <h6 class="fw-bold">${item.name}</h6>
                            <p class="text-success fw-bold">KES ${item.price}/hr</p>
                            <button onclick="sendOrderRequest(${item.id}, '${item.name}')"
                                    class="btn btn-sm btn-primary rounded-pill w-100 mb-2">
                                🚜 Order Now
                            </button>
                            <a href="https://wa.me/${item.owner_phone}" target="_blank"
                               class="btn btn-sm btn-outline-success rounded-pill w-100">
                                💬 WhatsApp Owner
                            </a>
                        </div>
                    `);
                    marker.addTo(markerLayer);
                });

                if (data.length > 0) {
                    var group = new L.featureGroup(markerLayer.getLayers());
                    map.fitBounds(group.getBounds().pad(0.1));
                }
            }

            displayMarkers(allItems);

            map.on('locationfound', function(e) {
                L.marker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
                L.circle(e.latlng, e.accuracy).addTo(map);
            });

            map.on('locationerror', function(e) {
                alert("Location access denied: " + e.message);
            });

            setTimeout(function(){ map.invalidateSize(); }, 500);

        } else {
            console.error("Leaflet (L) failed to load.");
        }
    });

    function locateUser() {
        if (map) {
            map.locate({setView: true, maxZoom: 14});
        }
    }

    function sendOrderRequest(equipmentId, machineName) {
        if (!equipmentId) {
            console.error("Error: Equipment ID is missing!");
            return;
        }
        fetch(`/request-order/${equipmentId}/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                alert(`Request sent to ${machineName} owner! Please wait for them to accept.`);
            } else {
                alert("Error sending request. Are you logged in?");
            }
        });
    }
</script>
{% endblock %}

{% block extra_js %}
<script>
    const socket = new WebSocket(
        (window.location.protocol === 'https:' ? 'wss://' : 'ws://') +
        window.location.host + '/ws/notifications/'
    );

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        if (data.type === 'notification_alert') {
            const existing = document.getElementById('rental-banner');
            if (existing) existing.remove();

            const banner = document.createElement('div');
            banner.id = 'rental-banner';
            banner.innerHTML = `
                <div style="
                    position: fixed; top: 70px; left: 50%;
                    transform: translateX(-50%);
                    z-index: 9999; min-width: 340px; max-width: 500px;
                ">
                    <div class="alert alert-success shadow-lg rounded-4 d-flex align-items-center gap-3 p-4 border-0">
                        <span style="font-size: 2rem;">🎉</span>
                        <div>
                            <h6 class="fw-bold mb-1">Request Accepted!</h6>
                            <p class="mb-0 small">${data.message}</p>
                        </div>
                        <button type="button" class="btn-close ms-auto"
                                onclick="document.getElementById('rental-banner').remove()">
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(banner);

            setTimeout(() => {
                const b = document.getElementById('rental-banner');
                if (b) b.remove();
            }, 8000);
        }
    };

    socket.onclose = function() {
        console.error('WebSocket closed.');
    };
</script>
{% endblock %}
